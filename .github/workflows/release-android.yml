name: Android → APK Release

on:
  push:
    branches: [main]   # ← main push마다 자동 빌드 + 릴리즈
  workflow_dispatch:   # 수동 트리거도 유지

permissions:
  contents: write

jobs:
  build-apk:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0   # 전체 히스토리 필요 (changelog 생성용)

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Bump patch version
        run: |
          # pubspec.yaml의 version: X.Y.Z+N 에서 Z를 1 증가
          CURRENT=$(grep '^version:' pubspec.yaml | awk '{print $2}')
          SEMVER=$(echo "$CURRENT" | cut -d'+' -f1)
          BUILD=$(echo "$CURRENT" | cut -d'+' -f2)
          MAJOR=$(echo "$SEMVER" | cut -d'.' -f1)
          MINOR=$(echo "$SEMVER" | cut -d'.' -f2)
          PATCH=$(echo "$SEMVER" | cut -d'.' -f3)
          NEW_PATCH=$((PATCH + 1))
          NEW_BUILD=$((BUILD + 1))
          NEW_VERSION="${MAJOR}.${MINOR}.${NEW_PATCH}+${NEW_BUILD}"
          sed -i "s/^version: .*/version: ${NEW_VERSION}/" pubspec.yaml
          echo "Bumped: $CURRENT → $NEW_VERSION"
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add pubspec.yaml
          git commit -m "chore: bump version to ${NEW_VERSION} [skip ci]"
          git push

      - name: Flutter pub get
        run: flutter pub get

      - name: Setup signing
        env:
          KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
          cat > android/key.properties <<EOF
          storePassword=$STORE_PASSWORD
          keyPassword=$KEY_PASSWORD
          keyAlias=$KEY_ALIAS
          storeFile=../app/release.jks
          EOF

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          BUILD=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f2)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: Generate changelog
        id: changelog
        run: |
          VERSION_TAG="v$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)"
          # 이전 릴리즈 태그 찾기 (없으면 최근 10개 커밋)
          PREV_TAG=$(git tag --sort=-creatordate | grep '^v' | head -1 2>/dev/null || echo "")
          if [ -n "$PREV_TAG" ] && [ "$PREV_TAG" != "$VERSION_TAG" ]; then
            CHANGES=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s" --no-merges 2>/dev/null)
          else
            CHANGES=$(git log --pretty=format:"- %s" --no-merges --max-count=15)
          fi
          # 빈 경우 fallback
          [ -z "$CHANGES" ] && CHANGES="- 코드 업데이트"
          # GitHub Actions multiline output
          {
            echo "notes<<CHANGELOG_EOF"
            echo "$CHANGES"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk  artifacts/cocosum-arm64.apk  2>/dev/null || true
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk artifacts/cocosum-armv7.apk  2>/dev/null || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk      artifacts/cocosum-x86_64.apk 2>/dev/null || true
          cp build/app/outputs/bundle/release/app-release.aab           artifacts/cocosum-release.aab 2>/dev/null || true
          ls -la artifacts/

      - name: Create / Update GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "코코숨 ${{ steps.version.outputs.version }} (Build ${{ steps.version.outputs.build }})"
          body: |
            ## 코코숨 (CoCo-Sum) ${{ steps.version.outputs.version }}

            🌤️ **우리 아가 맑은 숨결 지킴이**

            ### Android 설치 방법
            | 파일 | 대상 기기 |
            |------|----------|
            | `cocosum-arm64.apk` | 최신 Android 폰 (권장) |
            | `cocosum-armv7.apk` | 구형 Android 폰 |
            | `cocosum-x86_64.apk` | 에뮬레이터 |
            | `cocosum-release.aab` | Play Store 업로드용 |

            > **설치 전:** 설정 → 보안 → 알 수 없는 앱 설치 허용

            ### 변경사항
            ${{ steps.changelog.outputs.notes }}
          files: |
            artifacts/cocosum-arm64.apk
            artifacts/cocosum-armv7.apk
            artifacts/cocosum-x86_64.apk
            artifacts/cocosum-release.aab
          make_latest: true
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ steps.version.outputs.version }}-${{ github.run_number }}
          path: artifacts/
          retention-days: 30
