name: Android → APK Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      create_release:
        description: 'GitHub Release 생성 여부'
        required: true
        default: 'true'
        type: boolean

permissions:
  contents: write

jobs:
  build-apk:
    name: Build & Release APK
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: '3.32.0'
          channel: 'stable'
          cache: true

      - name: Flutter pub get
        run: flutter pub get

      # 서명 키가 있는 경우 (Secrets에 KEYSTORE_BASE64 등록 후 활성화)
      # - name: Setup signing
      #   env:
      #     KEYSTORE_BASE64: ${{ secrets.KEYSTORE_BASE64 }}
      #     KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
      #     KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
      #     STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
      #   run: |
      #     echo "$KEYSTORE_BASE64" | base64 --decode > android/app/release.jks
      #     cat > android/key.properties <<EOF
      #     storePassword=$STORE_PASSWORD
      #     keyPassword=$KEY_PASSWORD
      #     keyAlias=$KEY_ALIAS
      #     storeFile=release.jks
      #     EOF

      - name: Build APK (release)
        run: flutter build apk --release --split-per-abi

      - name: Build App Bundle (AAB)
        run: flutter build appbundle --release

      - name: Get version
        id: version
        run: |
          VERSION=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)
          BUILD=$(grep '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f2)
          echo "version=v$VERSION" >> $GITHUB_OUTPUT
          echo "build=$BUILD" >> $GITHUB_OUTPUT

      - name: Collect artifacts
        run: |
          mkdir -p artifacts
          # 아키텍처별 APK
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk  artifacts/cocosum-arm64.apk     2>/dev/null || true
          cp build/app/outputs/flutter-apk/app-armeabi-v7a-release.apk artifacts/cocosum-armv7.apk    2>/dev/null || true
          cp build/app/outputs/flutter-apk/app-x86_64-release.apk      artifacts/cocosum-x86_64.apk   2>/dev/null || true
          # 범용 AAB (Play Store용)
          cp build/app/outputs/bundle/release/app-release.aab artifacts/cocosum-release.aab 2>/dev/null || true
          ls -la artifacts/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.version }}
          name: "코코숨 ${{ steps.version.outputs.version }} (Build ${{ steps.version.outputs.build }})"
          body: |
            ## 코코숨 (CoCo-Sum) ${{ steps.version.outputs.version }}

            🌤️ **우리 아가 맑은 숨결 지킴이**

            ### Android 설치 방법
            | 파일 | 대상 기기 |
            |------|----------|
            | `cocosum-arm64.apk` | 최신 Android 폰 (권장) |
            | `cocosum-armv7.apk` | 구형 Android 폰 |
            | `cocosum-x86_64.apk` | 에뮬레이터 |
            | `cocosum-release.aab` | Play Store 업로드용 |

            > **설치 전:** 설정 → 보안 → 알 수 없는 앱 설치 허용

            ### 변경사항
            - Phase 1 MVP: 위치 기반 미세먼지 (PM2.5/PM10) 조회
            - 코코 마스코트 — 공기질별 표정 + 둥실 애니메이션
            - 행동 지침 배너 (나가도 돼요 / 마스크 써요 / 집에 있어요)
          files: |
            artifacts/cocosum-arm64.apk
            artifacts/cocosum-armv7.apk
            artifacts/cocosum-x86_64.apk
            artifacts/cocosum-release.aab
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: android-build-${{ steps.version.outputs.version }}
          path: artifacts/
          retention-days: 30
