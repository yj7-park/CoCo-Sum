name: coco_sum
description: "코코숨 - 우리 아가 맑은 숨결 지킴이"
publish_to: 'none'
version: 1.0.11+12

environment:
  sdk: ^3.8.0

dependencies:
  flutter:
    sdk: flutter
  cupertino_icons: ^1.0.8

  # 네트워크 & 크롤링
  dio: ^5.8.0+1
  html: ^0.15.6

  # 상태 관리
  flutter_riverpod: ^2.6.1

  # 위치
  geolocator: ^14.0.1
  geocoding: ^3.0.0

  # 알림
  flutter_local_notifications: ^18.0.1

  # 차트 (Phase 2)
  fl_chart: ^0.71.0

  # 로컬 저장소
  shared_preferences: ^2.5.3

  # 날짜/시간 포맷
  intl: ^0.20.2

  # 폰트
  google_fonts: ^6.2.1

  # 앱 버전 정보 (자동 업데이트 체크용)
  package_info_plus: ^8.0.0

  # URL 실행 (업데이트 다운로드 페이지 열기)
  url_launcher: ^6.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icons/app_icon.png"
  adaptive_icon_background: "#87CEEB"   # 하늘색 배경 (Android 12+ adaptive icon)
  adaptive_icon_foreground: "assets/icons/app_icon.png"
  remove_alpha_ios: true                # App Store 정책: iOS 아이콘 alpha 채널 제거
  web:
    generate: true
    image_path: "assets/icons/app_icon.png"
    background_color: "#87CEEB"
    theme_color: "#4FC3F7"
  windows:
    generate: false
  macos:
    generate: false

flutter:
  uses-material-design: true
  assets:
    - assets/icons/
